<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theater in Quarantine — Dual Stream</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #080808; --offwhite: #e8e2d9; --dim: #5a5550; --accent: #c8a97e;
    --transition: 0.35s cubic-bezier(0.77, 0, 0.175, 1);
  }
  body {
    background: var(--black); color: var(--offwhite);
    font-family: 'Inconsolata', monospace; font-weight: 300;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 32px 16px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100; opacity: 0.35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }
  header { text-align: center; margin-bottom: 20px; letter-spacing: 0.18em; }
  .title { font-family: 'IM Fell English', serif; font-size: clamp(1rem, 2.5vw, 1.5rem); color: var(--offwhite); font-style: italic; margin-bottom: 4px; }
  .subtitle { font-size: 0.6rem; color: var(--dim); letter-spacing: 0.3em; text-transform: uppercase; }

  .stage {
    position: relative; width: 100%; max-width: 900px; aspect-ratio: 16/9;
    background: #000; border: 1px solid #1a1a1a; overflow: hidden;
  }
  .player-wrap {
    position: absolute; inset: 0; width: 100%; height: 100%;
    transition: opacity var(--transition);
  }
  .player-wrap.behind { opacity: 0; pointer-events: none; }
  .player-wrap > div, .player-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  .yt-top-block {
    position: absolute; top: 0; left: 0; right: 0; height: 85%;
    z-index: 3; cursor: default;
  }
  .stage:not(:hover) .yt-top-block { pointer-events: none; }
  .stage:hover .yt-top-block { pointer-events: auto; }

  .pip-container {
    position: absolute; top: 14px; right: 14px;
    width: 22%; aspect-ratio: 16/9;
    z-index: 10; cursor: pointer;
    border: 1px solid rgba(200,169,126,0.3); overflow: hidden; background: #000;
    transition: border-color 0.2s, transform 0.2s;
  }
  .pip-container:hover { border-color: var(--accent); transform: scale(1.04); }
  .pip-viewport { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .pip-clone { position: absolute; top: 0; left: 0; transform-origin: top left; }
  .pip-clone iframe { border: none; display: block; pointer-events: none; }
  .pip-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 4px 6px; font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); background: linear-gradient(transparent, rgba(0,0,0,0.85));
    text-align: center; opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .pip-container:hover .pip-label { opacity: 1; }

  .badge {
    position: absolute; top: 14px; left: 14px; font-size: 0.55rem;
    letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent);
    background: rgba(0,0,0,0.65); padding: 3px 8px;
    border: 1px solid rgba(200,169,126,0.2); pointer-events: none; z-index: 10;
  }
  .shutter { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 30; transition: opacity 0.06s; }
  .shutter.fire { opacity: 0.07; }
  .loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--dim); z-index: 5; background: var(--black); transition: opacity 0.5s;
  }
  .loading.gone { opacity: 0; pointer-events: none; }
  footer { margin-top: 14px; font-size: 0.58rem; color: var(--dim); letter-spacing: 0.15em; text-align: center; line-height: 1.9; }
  footer span { color: var(--accent); }
</style>
</head>
