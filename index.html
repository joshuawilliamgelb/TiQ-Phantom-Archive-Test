<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiQ Dual Stream</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 100%;
    aspect-ratio: 16/9;
  }

  .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .layer.hidden {
    opacity: 0;
    pointer-events: none;
  }

  video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }

  .controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 20;
  }

  .stage:hover .controls { opacity: 1; }

  .btn {
    background: none;
    border: none;
    color: #e8e2d9;
    cursor: pointer;
    font-size: 14px;
    padding: 4px 6px;
    flex-shrink: 0;
    opacity: 0.85;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 1; }

  .progress {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: #c8a97e;
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
  }

  .time {
    font-family: monospace;
    font-size: 11px;
    color: #e8e2d9;
    opacity: 0.7;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .pip {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 16%;
    aspect-ratio: 16/9;
    z-index: 15;
    cursor: pointer;
    overflow: hidden;
    border: 1px solid rgba(200,169,126,0.4);
    transition: border-color 0.2s, transform 0.2s;
    background: #000;
  }

  .pip:hover { border-color: #c8a97e; transform: scale(1.05); }

  .pip video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  .upper-shield {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: calc(100% - 48px);
    z-index: 10;
    cursor: default;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     SET YOUR VIDEO URLS HERE
═══════════════════════════════════ -->
<script>
  const MAIN_URL = 'https://ia903202.us.archive.org/20/items/tiq-phantom-of-the-opera/SYNC%20ARCHIVE%20-%20Phantom.mp4';
  const BTS_URL  = 'PASTE_BTS_VIDEO_URL_HERE';
</script>
<!-- ═══════════════════════════════════ -->

<div class="stage" id="stage">

  <div class="layer" id="layer-main">
    <video id="vid-main" preload="auto" playsinline></video>
  </div>

  <div class="layer hidden" id="layer-bts">
    <video id="vid-bts" preload="auto" playsinline muted></video>
  </div>

  <div class="pip" id="pip" onclick="toggle()">
    <video id="vid-pip" muted playsinline></video>
  </div>

  <div class="upper-shield" onclick="togglePlayPause()"></div>

  <div class="controls">
    <button class="btn" id="btn-play" onclick="togglePlayPause()">▶</button>
    <div class="progress" id="progress" onclick="seek(event)">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="time" id="time-display">0:00 / 0:00</div>
    <button class="btn" onclick="toggleMute()">🔊</button>
  </div>

</div>

<script>
  const vidMain = document.getElementById('vid-main');
  const vidBts  = document.getElementById('vid-bts');
  const vidPip  = document.getElementById('vid-pip');

  let showingMain = true;
  let isMuted = false;

  vidMain.src = MAIN_URL;
  vidBts.src  = BTS_URL;
  vidPip.src  = BTS_URL;

  vidMain.addEventListener('play', () => {
    syncBts();
    vidBts.play().catch(()=>{});
    vidPip.play().catch(()=>{});
    document.getElementById('btn-play').textContent = '⏸';
  });

  vidMain.addEventListener('pause', () => {
    vidBts.pause();
    vidPip.pause();
    document.getElementById('btn-play').textContent = '▶';
  });

  vidMain.addEventListener('seeked', () => {
    syncBts();
    syncPip();
  });

  vidMain.addEventListener('timeupdate', () => {
    updateProgress();
    if (Math.abs(vidMain.currentTime - vidBts.currentTime) > 0.5) {
      vidBts.currentTime = vidMain.currentTime;
    }
  });

  function syncBts() { vidBts.currentTime = vidMain.currentTime; }
  function syncPip() { vidPip.currentTime = vidMain.currentTime; }

  function togglePlayPause() {
    if (vidMain.paused) { vidMain.play(); } else { vidMain.pause(); }
  }

  function toggleMute() {
    isMuted = !isMuted;
    vidMain.muted = isMuted;
    document.querySelector('.btn:last-child').textContent = isMuted ? '🔇' : '🔊';
  }

  function seek(e) {
    const bar  = document.getElementById('progress');
    const rect = bar.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    vidMain.currentTime = pct * vidMain.duration;
  }

  function updateProgress() {
    if (!vidMain.duration) return;
    const pct = (vidMain.currentTime / vidMain.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent =
      fmt(vidMain.currentTime) + ' / ' + fmt(vidMain.duration);
  }

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function toggle() {
    showingMain = !showingMain;
    const layerMain = document.getElementById('layer-main');
    const layerBts  = document.getElementById('layer-bts');

    if (showingMain) {
      layerMain.classList.remove('hidden');
      layerBts.classList.add('hidden');
      vidPip.src = BTS_URL;
    } else {
      layerBts.classList.remove('hidden');
      layerMain.classList.add('hidden');
      vidPip.src = MAIN_URL;
    }
    vidPip.currentTime = vidMain.currentTime;
    if (!vidMain.paused) vidPip.play().catch(()=>{});
  }

  vidMain.addEventListener('canplay', () => {
    vidMain.play().catch(()=>{});
  }, { once: true });
</script>
</body>
</html>
