<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TiQ Dual Stream</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#000; width:100%; height:100dvh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .stage { position:relative; width:100%; max-width:100%; aspect-ratio:16/9; }
  .layer { position:absolute; inset:0; width:100%; height:100%; }
  .layer.hidden { opacity:0; pointer-events:none; }
  video { width:100%; height:100%; display:block; object-fit:contain; }

  .controls {
    position:absolute; bottom:0; left:0; right:0;
    padding:0 12px 10px;
    background:linear-gradient(transparent, rgba(0,0,0,0.85));
    opacity:0; transition:opacity 0.25s; z-index:20;
  }
  .stage:hover .controls { opacity:1; }

  @media (hover: none) {
    .controls { opacity:1; }
    .pip { bottom:80px !important; }
  }

  .scrubber-row {
    position:relative; width:100%; height:18px;
    display:flex; align-items:center; margin-bottom:6px; cursor:pointer;
    touch-action: none;
  }
  .progress-track {
    position:absolute; left:0; right:0; height:3px;
    background:rgba(255,255,255,0.2); border-radius:2px; transition:height 0.15s;
  }
  .scrubber-row:hover .progress-track { height:5px; }
  .progress-fill { height:100%; background:#c8a97e; border-radius:2px; width:0%; pointer-events:none; position:relative; }
  .progress-thumb {
    position:absolute; right:-5px; top:50%; transform:translateY(-50%);
    width:10px; height:10px; background:#c8a97e; border-radius:50%;
    opacity:0; transition:opacity 0.15s; pointer-events:none;
  }
  .scrubber-row:hover .progress-thumb { opacity:1; }
  .scrubber-row.scrubbing .progress-thumb { opacity:1; }

  .preview-bubble {
    position:absolute; bottom:28px; transform:translateX(-50%);
    display:none; flex-direction:column; align-items:center;
    pointer-events:none; z-index:30;
  }
  .preview-bubble.visible { display:flex; }
  .preview-frame {
    width:160px; height:90px;
    border:1px solid rgba(200,169,126,0.5);
    background:#000 no-repeat;
    background-size: auto 90px;
    display:block; flex-shrink:0;
  }
  .preview-time {
    font-family:monospace; font-size:10px; color:#c8a97e;
    margin-top:3px; background:rgba(0,0,0,0.7);
    padding:1px 5px; border-radius:2px;
  }

  .controls-row { display:flex; align-items:center; gap:8px; }
  .btn { background:none; border:none; color:#e8e2d9; cursor:pointer; font-size:15px; padding:2px 4px; flex-shrink:0; opacity:0.85; transition:opacity 0.15s; line-height:1; }
  .btn:hover { opacity:1; }
  .time { font-family:monospace; font-size:11px; color:#e8e2d9; opacity:0.65; white-space:nowrap; flex-shrink:0; }
  .volume-group { display:flex; align-items:center; gap:5px; flex-shrink:0; }
  .volume-slider {
    -webkit-appearance:none; appearance:none;
    width:70px; height:3px;
    background:rgba(255,255,255,0.25); border-radius:2px;
    outline:none; cursor:pointer; accent-color:#c8a97e;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:10px; height:10px;
    border-radius:50%; background:#c8a97e; cursor:pointer;
  }
  .spacer { flex:1; }

  .pip {
    position:absolute; bottom:12px; right:12px;
    width:16%; aspect-ratio:16/9; z-index:15; cursor:pointer;
    overflow:hidden; border:1px solid rgba(200,169,126,0.4);
    transition:border-color 0.2s, transform 0.2s, bottom 0.25s;
    background:#000;
  }
  .stage:hover .pip { bottom:80px; }
  .pip:hover { border-color:#c8a97e; transform:scale(1.05); }
  .pip video { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .pip video.hidden-pip { display:none; }

  .poster {
    position:absolute; inset:0; z-index:25;
    background-size:cover; background-position:center; background-repeat:no-repeat;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:opacity 0.4s;
  }
  .poster.gone { opacity:0; pointer-events:none; }

  .play-btn {
    width:72px; height:72px; border-radius:50%;
    background:rgba(0,0,0,0.55);
    border:2px solid rgba(200,169,126,0.7);
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.2s, border-color 0.2s;
    flex-shrink:0;
  }
  .poster:hover .play-btn { transform:scale(1.1); border-color:#c8a97e; }
  .play-btn::after {
    content:'';
    display:block;
    width:0; height:0;
    border-style:solid;
    border-width:14px 0 14px 24px;
    border-color:transparent transparent transparent #e8e2d9;
    margin-left:6px;
  }

  .pip-poster {
    position:absolute; inset:0; z-index:5;
    background-size:cover; background-position:center;
    transition:opacity 0.4s;
  }
  .pip-poster.gone { opacity:0; pointer-events:none; }

  .upper-shield { position:absolute; top:0; left:0; right:0; height:calc(100% - 80px); z-index:10; cursor:default; }

  #exit-btn {
    display:none; position:fixed; top:12px; left:12px; z-index:9999;
    background:none; border:none; border-bottom:1px solid white;
    color:white; font-family:sans-serif; font-size:12px;
    letter-spacing:0.08em; cursor:pointer; padding-bottom:2px;
  }
</style>
</head>
<body>

<button id="exit-btn" onclick="exitEmbedded()">← Return</button>

<script>
  const MAIN_URL       = 'https://tiq-phantom-archive.b-cdn.net/SYNC%20ARCHIVE%20-%20Phantom.mp4';
  const BTS_URL        = 'https://tiq-phantom-archive.b-cdn.net/SYNC%20ARCHIVE%20-%20Bts%20Phantom.mp4';
  const THUMB_MAIN     = 'https://joshuawilliamgelb.github.io/TiQ-Phantom-Archive-Test/thumbs-bts.jpg';
  const THUMB_BTS      = 'https://joshuawilliamgelb.github.io/TiQ-Phantom-Archive-Test/thumbs-main.jpg';
  const POSTER_URL     = 'https://tiq-phantom-archive.b-cdn.net/watch%20now.png';
  const THUMB_INTERVAL = 10;
</script>

<div class="stage" id="stage">
  <div class="layer" id="layer-main">
    <video id="vid-main" preload="none" playsinline>
  <track kind="subtitles" src="https://joshuawilliamgelb.github.io/TiQ-Phantom-Archive-Test/captions-edited.vtt" srclang="en" label="English" default>
</video>
  </div>
  <div class="layer hidden" id="layer-bts">
 <video id="vid-bts" preload="none" playsinline muted>
  <track kind="subtitles" src="https://joshuawilliamgelb.github.io/TiQ-Phantom-Archive-Test/captions-edited.vtt" srclang="en" label="English" default>
</video>
  </div>

  <div class="pip" id="pip" onclick="toggle()">
    <video id="vid-pip-bts" muted playsinline></video>
    <video id="vid-pip-main" muted playsinline class="hidden-pip"></video>
    <div class="pip-poster" id="pip-poster"></div>
  </div>

  <div class="upper-shield" onclick="handleShieldTap()"></div>

  <div class="poster" id="poster" onclick="startPlay()">
    <div class="play-btn"></div>
  </div>

  <div class="controls">
    <div class="scrubber-row" id="scrubber">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill">
          <div class="progress-thumb"></div>
        </div>
      </div>
      <div class="preview-bubble" id="preview-bubble">
        <div class="preview-frame" id="preview-frame"></div>
        <div class="preview-time" id="preview-time">0:00</div>
      </div>
    </div>
    <div class="controls-row">
      <button class="btn" id="btn-play" onclick="togglePlayPause()">▶</button>
      <div class="volume-group">
        <button class="btn" id="btn-mute" onclick="toggleMute()">🔊</button>
        <input type="range" class="volume-slider" id="volume-slider"
               min="0" max="1" step="0.02" value="1" oninput="setVolume(this.value)">
      </div>
      <div class="time" id="time-display">0:00 / 0:00</div>
      <div class="spacer"></div>
     <button class="btn" id="btn-sub" onclick="toggleSubs()" title="Subtitles">CC</button>
     <button class="btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
    </div>
  </div>
</div>

<script>
  const vidMain    = document.getElementById('vid-main');
  const vidBts     = document.getElementById('vid-bts');
  const vidPipBts  = document.getElementById('vid-pip-bts');
  const vidPipMain = document.getElementById('vid-pip-main');
  const poster     = document.getElementById('poster');
  const pipPoster  = document.getElementById('pip-poster');
  const stage      = document.getElementById('stage');
  const scrubber   = document.getElementById('scrubber');
  const volSlider  = document.getElementById('volume-slider');

  let showingMain = true;
  let isMuted = false;
  let hasStarted = false;
  let isScrubbing = false;

  vidMain.src    = MAIN_URL;
  vidBts.src     = BTS_URL;
  vidPipBts.src  = BTS_URL;
  vidPipMain.src = MAIN_URL;

  poster.style.backgroundImage    = `url('${POSTER_URL}')`;
  pipPoster.style.backgroundImage = `url('${POSTER_URL}')`;

  function startPlay() {
    hasStarted = true;
    poster.classList.add('gone');
    pipPoster.classList.add('gone');
    vidMain.play().catch(()=>{});
  }

  function handleShieldTap() {
    if (!hasStarted) { startPlay(); } else { togglePlayPause(); }
  }

  vidMain.addEventListener('play', () => {
    vidBts.play().catch(()=>{});
    vidPipBts.play().catch(()=>{});
    vidPipMain.play().catch(()=>{});
    poster.classList.add('gone');
    pipPoster.classList.add('gone');
    document.getElementById('btn-play').textContent = '⏸';
  });

  vidMain.addEventListener('pause', () => {
    vidBts.pause(); vidPipBts.pause(); vidPipMain.pause();
    document.getElementById('btn-play').textContent = '▶';
  });

  vidMain.addEventListener('seeked', () => {
    const t = vidMain.currentTime;
    vidBts.currentTime     = t;
    vidPipBts.currentTime  = t;
    vidPipMain.currentTime = t;
  });

  vidMain.addEventListener('timeupdate', () => {
    updateProgress();
    if (Math.abs(vidMain.currentTime - vidBts.currentTime) > 0.5) {
      vidBts.currentTime = vidMain.currentTime;
    }
  });

  // Volume sync
  vidMain.addEventListener('volumechange', () => {
    if (!isMuted) {
      volSlider.value = vidMain.volume;
    }
  });

  function togglePlayPause() {
    if (!hasStarted) { startPlay(); return; }
    if (vidMain.paused) { vidMain.play(); } else { vidMain.pause(); }
  }

  function toggleMute() {
    isMuted = !isMuted;
    vidMain.muted = isMuted;
    document.getElementById('btn-mute').textContent = isMuted ? '🔇' : '🔊';
    volSlider.value = isMuted ? 0 : vidMain.volume;
  }

  function setVolume(val) {
    const v = parseFloat(val);
    vidMain.volume = v;
    isMuted = (v === 0);
    vidMain.muted = isMuted;
    document.getElementById('btn-mute').textContent = isMuted ? '🔇' : '🔊';
  }

  // Scrubber — mouse
  scrubber.addEventListener('mousedown', (e) => {
    isScrubbing = true;
    scrubber.classList.add('scrubbing');
    seekFromEvent(e.clientX);
    showPreview(e.clientX);
  });

  document.addEventListener('mousemove', (e) => {
    if (!isScrubbing) return;
    seekFromEvent(e.clientX);
    showPreview(e.clientX);
  });

  document.addEventListener('mouseup', () => {
    if (!isScrubbing) return;
    isScrubbing = false;
    scrubber.classList.remove('scrubbing');
    hidePreview();
  });

  // Scrubber — touch
  scrubber.addEventListener('touchstart', (e) => {
    e.preventDefault();
    isScrubbing = true;
    scrubber.classList.add('scrubbing');
    seekFromEvent(e.touches[0].clientX);
    showPreview(e.touches[0].clientX);
  }, { passive: false });

  scrubber.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!isScrubbing) return;
    seekFromEvent(e.touches[0].clientX);
    showPreview(e.touches[0].clientX);
  }, { passive: false });

  scrubber.addEventListener('touchend', () => {
    isScrubbing = false;
    scrubber.classList.remove('scrubbing');
    hidePreview();
  });

  function seekFromEvent(clientX) {
    const rect = scrubber.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    if (vidMain.duration) vidMain.currentTime = pct * vidMain.duration;
  }

  function showPreview(clientX) {
    if (!vidMain.duration) return;
    const rect    = scrubber.getBoundingClientRect();
    const pct     = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const t       = pct * vidMain.duration;
    const frame   = document.getElementById('preview-frame');
    const bubble  = document.getElementById('preview-bubble');
    const label   = document.getElementById('preview-time');
    const sprite  = showingMain ? THUMB_MAIN : THUMB_BTS;
    const idx     = Math.floor(t / THUMB_INTERVAL);
    const offsetX = -(idx * 160);
    frame.style.backgroundImage    = `url('${sprite}')`;
    frame.style.backgroundPosition = `${offsetX}px 0`;
    const rawX     = clientX - rect.left;
    const clampedX = Math.max(80, Math.min(rect.width - 80, rawX));
    bubble.style.left = clampedX + 'px';
    bubble.classList.add('visible');
    label.textContent = fmt(t);
  }

  function hidePreview() {
    document.getElementById('preview-bubble').classList.remove('visible');
  }

  function updateProgress() {
    if (!vidMain.duration) return;
    const pct = (vidMain.currentTime / vidMain.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent =
      fmt(vidMain.currentTime) + ' / ' + fmt(vidMain.duration);
  }

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function toggle() {
    showingMain = !showingMain;
    document.getElementById('layer-main').classList.toggle('hidden', !showingMain);
    document.getElementById('layer-bts').classList.toggle('hidden', showingMain);
    if (showingMain) {
      vidPipBts.classList.remove('hidden-pip');
      vidPipMain.classList.add('hidden-pip');
    } else {
      vidPipMain.classList.remove('hidden-pip');
      vidPipBts.classList.add('hidden-pip');
    }
  }
function toggleSubs() {
    const tracks = [vidMain.textTracks[0], vidBts.textTracks[0]];
    const btn = document.getElementById('btn-sub');
    const showing = tracks[0] && tracks[0].mode === 'showing';
    tracks.forEach(t => { if (t) t.mode = showing ? 'hidden' : 'showing'; });
    btn.style.opacity = showing ? '0.35' : '1';
  }
  }
  function toggleFullscreen() {
    const isEmbedded = window !== window.parent;
    if (isEmbedded) {
      window.parent.postMessage('tiq-fullscreen', '*');
      document.getElementById('exit-btn').style.display = 'block';
    } else {
      if (!document.fullscreenElement) {
        stage.requestFullscreen().catch(()=>{});
      } else {
        document.exitFullscreen();
      }
    }
  }

  function exitEmbedded() {
    document.getElementById('exit-btn').style.display = 'none';
    window.parent.postMessage('tiq-exitfullscreen', '*');
  }

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && window !== window.parent) {
      window.parent.postMessage('tiq-exitfullscreen', '*');
    }
  });

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'tiq-resize') {
      stage.style.width  = e.data.width  + 'px';
      stage.style.height = e.data.height + 'px';
    }
    if (e.data && e.data.type === 'tiq-resize-reset') {
      stage.style.width  = '';
      stage.style.height = '';
    }
  });
</script>
</body>
</html>
