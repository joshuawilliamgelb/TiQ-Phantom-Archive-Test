<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiQ Subtitle Editor</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inconsolata:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #080808;
    --bg: #0e0e0e;
    --panel: #111;
    --border: #1e1e1e;
    --offwhite: #e8e2d9;
    --dim: #5a5550;
    --accent: #c8a97e;
    --accent2: #7e9ec8;
    --red: #c84a4a;
    --green: #4ac87e;
    --selected: rgba(200,169,126,0.18);
    --active: rgba(200,169,126,0.35);
  }

  body {
    background: var(--black);
    color: var(--offwhite);
    font-family: 'Inconsolata', monospace;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .topbar h1 {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--offwhite);
    margin-right: 8px;
  }

  .topbar-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Inconsolata', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 10px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
  .topbar-btn.accent { border-color: var(--accent); color: var(--accent); }
  .topbar-btn.accent:hover { background: var(--accent); color: var(--black); }

  .spacer { flex: 1; }

  .status-bar {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.15em;
  }

  /* ── Main layout ── */
  .main {
    display: grid;
    grid-template-columns: 420px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left: video + timeline ── */
  .left-col {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    flex-shrink: 0;
  }

  .video-wrap video {
    width: 100%; height: 100%;
    display: block; object-fit: contain;
  }

  /* Subtitle overlay on video */
  .sub-overlay {
    position: absolute;
    bottom: 48px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }

  .sub-overlay span {
    display: inline-block;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-family: 'Inconsolata', monospace;
    font-size: 0.85rem;
    padding: 3px 8px;
    border-radius: 2px;
    max-width: 90%;
    white-space: pre-wrap;
    text-align: center;
  }

  /* Video controls */
  .vid-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: #0a0a0a;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .vid-btn {
    background: none; border: none;
    color: var(--offwhite); cursor: pointer;
    font-size: 13px; padding: 2px 4px;
    opacity: 0.8; transition: opacity 0.15s;
  }
  .vid-btn:hover { opacity: 1; }

  .vid-progress {
    flex: 1; height: 3px;
    background: var(--border);
    border-radius: 2px; cursor: pointer;
    position: relative;
  }
  .vid-progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; width: 0%;
    pointer-events: none;
  }

  .vid-time {
    font-size: 0.65rem; color: var(--dim);
    white-space: nowrap;
  }

  /* ── Timeline ── */
  .timeline-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .timeline-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    flex-shrink: 0;
  }

  .timeline-scroll {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    position: relative;
  }

  #timeline-canvas {
    display: block;
    cursor: default;
  }

  /* ── Right: cue list ── */
  .right-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .cue-list-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    flex-shrink: 0;
    background: var(--panel);
  }

  .cue-list {
    flex: 1;
    overflow-y: auto;
  }

  .cue-item {
    display: grid;
    grid-template-columns: 32px 88px 88px 1fr 28px;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    min-height: 38px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .cue-item:hover { background: rgba(255,255,255,0.02); }
  .cue-item.selected { background: var(--selected); }
  .cue-item.active { background: var(--active); }

  .cue-num {
    font-size: 0.58rem;
    color: var(--dim);
    text-align: center;
    padding: 4px;
    user-select: none;
  }

  .cue-ts {
    font-size: 0.68rem;
    color: var(--accent);
    padding: 4px 6px;
    cursor: pointer;
    white-space: nowrap;
  }

  .cue-ts:hover { color: var(--offwhite); }

  .cue-text-cell {
    padding: 4px 6px;
  }

  .cue-text-input {
    background: transparent;
    border: none;
    color: var(--offwhite);
    font-family: 'Inconsolata', monospace;
    font-size: 0.75rem;
    line-height: 1.4;
    width: 100%;
    resize: none;
    outline: none;
    padding: 0;
    min-height: 20px;
  }

  .cue-text-input:focus {
    background: rgba(255,255,255,0.03);
  }

  .cue-del {
    background: none; border: none;
    color: var(--red); cursor: pointer;
    font-size: 0.7rem; opacity: 0.3;
    transition: opacity 0.15s; padding: 4px;
    text-align: center;
  }
  .cue-item:hover .cue-del { opacity: 0.7; }
  .cue-del:hover { opacity: 1 !important; }

  /* Timestamp editor popup */
  .ts-popup {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--accent);
    padding: 12px;
    z-index: 100;
    display: none;
    flex-direction: column;
    gap: 8px;
    min-width: 200px;
  }

  .ts-popup.visible { display: flex; }

  .ts-popup label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .ts-popup input {
    background: #0d0d0d;
    border: 1px solid var(--border);
    color: var(--offwhite);
    font-family: 'Inconsolata', monospace;
    font-size: 0.85rem;
    padding: 5px 8px;
    outline: none;
    width: 100%;
  }

  .ts-popup input:focus { border-color: var(--accent); }

  .ts-popup-btns {
    display: flex; gap: 6px;
  }

  .ts-popup-btns button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Inconsolata', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .ts-popup-btns button:hover { border-color: var(--accent); color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .drop-zone {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .drop-zone.visible { display: flex; }
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <h1>TiQ Subtitle Editor</h1>
  <button class="topbar-btn" onclick="document.getElementById('file-input').click()">Load VTT / SBV</button>
  <input type="file" id="file-input" accept=".vtt,.sbv" style="display:none" onchange="loadFile(event)">
  <button class="topbar-btn" onclick="addCue()">+ Add Cue</button>
  <button class="topbar-btn" onclick="deleteSelected()">Delete Selected</button>
  <button class="topbar-btn" onclick="shiftSelected()">Shift Selected…</button>
  <div class="spacer"></div>
  <div class="status-bar" id="status-bar">Load a VTT or SBV file to begin</div>
  <button class="topbar-btn accent" onclick="exportVTT()">Export VTT</button>
</div>

<!-- ── Main ── -->
<div class="main">

  <!-- Left: video + timeline -->
  <div class="left-col">
    <div class="video-wrap">
      <video id="vid" preload="none" playsinline></video>
      <div class="sub-overlay"><span id="sub-display"></span></div>
    </div>

    <div class="vid-controls">
        <button class="vid-btn" id="btn-play" onclick="togglePlay()" onmousedown="vid.load()">▶</button>
      <button class="vid-btn" onclick="skip(-5)">−5s</button>
      <button class="vid-btn" onclick="skip(5)">+5s</button>
      <div class="vid-progress" id="vid-progress" onclick="seekClick(event)">
        <div class="vid-progress-fill" id="vid-fill"></div>
      </div>
      <div class="vid-time" id="vid-time">0:00:00 / 0:00:00</div>
    </div>

    <div class="timeline-wrap">
      <div class="timeline-header">
        <span>Timeline</span>
        <span style="color:var(--accent);margin-left:4px;">drag cues to reposition · shift+click to multi-select</span>
      </div>
      <div class="timeline-scroll" id="timeline-scroll">
        <canvas id="timeline-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Right: cue list -->
  <div class="right-col">
    <div class="cue-list-header">
      <span>#</span>
      <span style="margin-left:32px;">Start</span>
      <span style="margin-left:56px;">End</span>
      <span style="margin-left:36px;">Text</span>
    </div>
    <div class="cue-list" id="cue-list"></div>
  </div>
</div>

<!-- Timestamp popup -->
<div class="ts-popup" id="ts-popup">
  <label id="ts-popup-label">Edit Timestamp</label>
  <input type="text" id="ts-popup-input" placeholder="HH:MM:SS.mmm">
  <div class="ts-popup-btns">
    <button onclick="tsPopupConfirm()">Set</button>
    <button onclick="tsPopupSetNow()">Use Now</button>
    <button onclick="tsPopupClose()">Cancel</button>
  </div>
</div>

<!-- Drop zone -->
<div class="drop-zone" id="drop-zone">Drop VTT or SBV file here</div>

<script>
  // ── State ──
  const VIDEO_URL = 'https://tiq-phantom-archive.b-cdn.net/SYNC%20ARCHIVE%20-%20Phantom.mp4';
  let cues = []; // { id, start, end, text }
  let selectedIds = new Set();
  let activeCueId = null;
  let nextId = 1;
  let tsPopupTarget = null; // { cueId, field }

  const vid = document.getElementById('vid');
  vid.src = VIDEO_URL;
  vid.preload = 'metadata';
  vid.load();
  

  // ── Utility ──
  function parseTS(ts) {
    ts = ts.trim().replace(',', '.');
    const parts = ts.split(':').map(Number);
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    if (parts.length === 2) return parts[0]*60 + parts[1];
    return parts[0];
  }

  function toVTTts(sec) {
    if (sec < 0) sec = 0;
    const h  = Math.floor(sec / 3600);
    const m  = Math.floor((sec % 3600) / 60);
    const s  = sec % 60;
    const ms = Math.round((s % 1) * 1000);
    return `${pad(h)}:${pad(m)}:${pad(Math.floor(s))}.${pad3(ms)}`;
  }

  function pad(n)  { return String(n).padStart(2,'0'); }
  function pad3(n) { return String(n).padStart(3,'0'); }

  function setStatus(msg) {
    document.getElementById('status-bar').textContent = msg;
  }

  // ── Load file ──
  function loadFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const content = ev.target.result;
      if (file.name.endsWith('.sbv')) {
        parseSBV(content);
        setStatus('SBV loaded & converted — ' + cues.length + ' cues');
      } else {
        parseVTT(content);
        setStatus('VTT loaded — ' + cues.length + ' cues');
      }
      renderList();
      drawTimeline();
    };
    reader.readAsText(file);
  }

  function parseVTT(text) {
    cues = [];
    nextId = 1;
    const lines = text.split('\n');
    let i = 0;
    while (i < lines.length) {
      const line = lines[i].trim();
      if (line.includes('-->')) {
        const [startRaw, endRaw] = line.split('-->').map(s => s.trim());
        const start = parseTS(startRaw);
        const end   = parseTS(endRaw);
        i++;
        const textLines = [];
        while (i < lines.length && lines[i].trim() !== '' && !lines[i].includes('-->')) {
          textLines.push(lines[i].trim());
          i++;
        }
        cues.push({ id: nextId++, start, end, text: textLines.join('\n') });
      } else {
        i++;
      }
    }
  }

  function parseSBV(text) {
    cues = [];
    nextId = 1;
    const lines = text.split('\n');
    let i = 0;
    while (i < lines.length) {
      const line = lines[i].trim();
      const m = line.match(/^(\d+:\d+:\d+\.\d+|\d+:\d+\.\d+),(\d+:\d+:\d+\.\d+|\d+:\d+\.\d+)$/);
      if (m) {
        const start = parseTS(m[1]);
        const end   = parseTS(m[2]);
        i++;
        const textLines = [];
        while (i < lines.length && lines[i].trim() !== '') {
          textLines.push(lines[i].trim());
          i++;
        }
        cues.push({ id: nextId++, start, end, text: textLines.join('\n') });
      } else {
        i++;
      }
    }
  }

  // ── Render cue list ──
  function renderList() {
    const list = document.getElementById('cue-list');
    list.innerHTML = '';
    cues.forEach((cue, idx) => {
      const row = document.createElement('div');
      row.className = 'cue-item' +
        (selectedIds.has(cue.id) ? ' selected' : '') +
        (cue.id === activeCueId ? ' active' : '');
      row.dataset.id = cue.id;

      row.innerHTML = `
        <div class="cue-num">${idx+1}</div>
        <div class="cue-ts" data-id="${cue.id}" data-field="start">${toVTTts(cue.start)}</div>
        <div class="cue-ts" data-id="${cue.id}" data-field="end">${toVTTts(cue.end)}</div>
        <div class="cue-text-cell">
          <textarea class="cue-text-input" data-id="${cue.id}" rows="1">${cue.text}</textarea>
        </div>
        <button class="cue-del" data-id="${cue.id}">✕</button>
      `;

      // Click row to select / jump
      row.addEventListener('click', (e) => {
        if (e.target.classList.contains('cue-ts') ||
            e.target.classList.contains('cue-text-input') ||
            e.target.classList.contains('cue-del')) return;
        if (e.shiftKey) {
          selectedIds.has(cue.id) ? selectedIds.delete(cue.id) : selectedIds.add(cue.id);
        } else {
          selectedIds.clear();
          selectedIds.add(cue.id);
          vid.currentTime = cue.start;
        }
        renderList();
        drawTimeline();
      });

      list.appendChild(row);
    });

    // Timestamp click
    list.querySelectorAll('.cue-ts').forEach(el => {
      el.addEventListener('click', (e) => {
        openTsPopup(parseInt(el.dataset.id), el.dataset.field, e.clientX, e.clientY);
      });
    });

    // Text edit
    list.querySelectorAll('.cue-text-input').forEach(el => {
      el.addEventListener('input', () => {
        const cue = cues.find(c => c.id === parseInt(el.dataset.id));
        if (cue) {
          cue.text = el.value;
          el.style.height = 'auto';
          el.style.height = el.scrollHeight + 'px';
        }
      });
      // Auto-height
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    });

    // Delete
    list.querySelectorAll('.cue-del').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.id);
        cues = cues.filter(c => c.id !== id);
        selectedIds.delete(id);
        renderList();
        drawTimeline();
      });
    });
  }

  // ── Scroll active cue into view ──
  function scrollActiveCueIntoView() {
    const list = document.getElementById('cue-list');
    const activeRow = list.querySelector('.cue-item.active');
    if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
  }

  // ── Add cue ──
  function addCue() {
    const t = vid.currentTime;
    cues.push({ id: nextId++, start: t, end: t + 2, text: 'New cue' });
    cues.sort((a,b) => a.start - b.start);
    renderList();
    drawTimeline();
  }

  // ── Delete selected ──
  function deleteSelected() {
    if (selectedIds.size === 0) { setStatus('No cues selected'); return; }
    cues = cues.filter(c => !selectedIds.has(c.id));
    selectedIds.clear();
    renderList();
    drawTimeline();
    setStatus('Deleted');
  }

  // ── Shift selected ──
  function shiftSelected() {
    if (selectedIds.size === 0) { setStatus('No cues selected'); return; }
    const secs = parseFloat(prompt('Shift selected cues by how many seconds? (+ or −)'));
    if (isNaN(secs)) return;
    cues.forEach(c => {
      if (selectedIds.has(c.id)) {
        c.start = Math.max(0, c.start + secs);
        c.end   = Math.max(c.start + 0.1, c.end + secs);
      }
    });
    cues.sort((a,b) => a.start - b.start);
    renderList();
    drawTimeline();
    setStatus(`Shifted ${selectedIds.size} cues by ${secs}s`);
  }

  // ── Timestamp popup ──
  function openTsPopup(cueId, field, x, y) {
    tsPopupTarget = { cueId, field };
    const cue = cues.find(c => c.id === cueId);
    const popup = document.getElementById('ts-popup');
    document.getElementById('ts-popup-label').textContent = field === 'start' ? 'Edit Start Time' : 'Edit End Time';
    document.getElementById('ts-popup-input').value = toVTTts(field === 'start' ? cue.start : cue.end);
    popup.style.left = Math.min(x, window.innerWidth - 220) + 'px';
    popup.style.top  = Math.min(y, window.innerHeight - 150) + 'px';
    popup.classList.add('visible');
    document.getElementById('ts-popup-input').focus();
  }

  function tsPopupConfirm() {
    const val = document.getElementById('ts-popup-input').value;
    const sec = parseTS(val);
    if (!isNaN(sec) && tsPopupTarget) {
      const cue = cues.find(c => c.id === tsPopupTarget.cueId);
      if (cue) cue[tsPopupTarget.field] = sec;
    }
    tsPopupClose();
    cues.sort((a,b) => a.start - b.start);
    renderList();
    drawTimeline();
  }

  function tsPopupSetNow() {
    document.getElementById('ts-popup-input').value = toVTTts(vid.currentTime);
  }

  function tsPopupClose() {
    document.getElementById('ts-popup').classList.remove('visible');
    tsPopupTarget = null;
  }

  document.getElementById('ts-popup-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tsPopupConfirm();
    if (e.key === 'Escape') tsPopupClose();
  });

  // ── Video controls ──
  function togglePlay() {
    if (vid.paused) { vid.play(); } else { vid.pause(); }
  }

  function skip(s) { vid.currentTime = Math.max(0, vid.currentTime + s); }

  function seekClick(e) {
    const bar = document.getElementById('vid-progress');
    const rect = bar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    vid.currentTime = pct * (vid.duration || 0);
  }

  vid.addEventListener('play',  () => { document.getElementById('btn-play').textContent = '⏸'; });
  vid.addEventListener('pause', () => { document.getElementById('btn-play').textContent = '▶'; });

  vid.addEventListener('timeupdate', () => {
    const t = vid.currentTime;
    const d = vid.duration || 0;
    const pct = d ? (t / d * 100) : 0;
    document.getElementById('vid-fill').style.width = pct + '%';
    document.getElementById('vid-time').textContent = toVTTts(t) + ' / ' + toVTTts(d);

    // Active cue
    const active = cues.find(c => t >= c.start && t <= c.end);
    const subEl = document.getElementById('sub-display');
    if (active) {
      subEl.textContent = active.text;
      if (active.id !== activeCueId) {
        activeCueId = active.id;
        renderList();
        scrollActiveCueIntoView();
      }
    } else {
      subEl.textContent = '';
      if (activeCueId !== null) {
        activeCueId = null;
        renderList();
      }
    }
  });

  // Separate RAF loop for playhead — doesn't block clicks
  function animatePlayhead() {
    drawTimeline();
    requestAnimationFrame(animatePlayhead);
  }
  requestAnimationFrame(animatePlayhead);

  // ── Timeline ──
  const TIMELINE_H = 80;
  const CUE_H = 24;
  const CUE_Y = 28;
  const RULER_H = 20;
  const PX_PER_SEC = 12;

  let dragState = null; // { type: 'cue'|'selection', ... }

  function drawTimeline() {
    const canvas  = document.getElementById('timeline-canvas');
    const scroll  = document.getElementById('timeline-scroll');
    const dur     = vid.duration || 3900; // default ~65min
    const totalW  = Math.max(dur * PX_PER_SEC + 100, scroll.clientWidth);

    canvas.width  = totalW;
    canvas.height = TIMELINE_H;
    scroll.style.height = TIMELINE_H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, totalW, TIMELINE_H);

    // Background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, totalW, TIMELINE_H);

    // Ruler
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, totalW, RULER_H);

    // Ruler ticks
    const step = PX_PER_SEC >= 10 ? 10 : 30;
    for (let s = 0; s <= dur + step; s += step) {
      const x = s * PX_PER_SEC;
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, RULER_H);
      ctx.stroke();
      ctx.fillStyle = '#5a5550';
      ctx.font = '9px Inconsolata, monospace';
      ctx.fillText(toVTTts(s).substring(0,8), x + 2, 13);
    }

    // Cues
    cues.forEach(cue => {
      const x = cue.start * PX_PER_SEC;
      const w = Math.max((cue.end - cue.start) * PX_PER_SEC, 4);
      const isSelected = selectedIds.has(cue.id);
      const isActive   = cue.id === activeCueId;

      ctx.fillStyle = isActive ? 'rgba(200,169,126,0.6)' :
                      isSelected ? 'rgba(200,169,126,0.35)' :
                      'rgba(126,158,200,0.35)';
      ctx.fillRect(x, CUE_Y, w, CUE_H);

      ctx.strokeStyle = isActive ? '#c8a97e' :
                        isSelected ? '#c8a97e' : '#7e9ec8';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, CUE_Y, w, CUE_H);

      // Label
      ctx.fillStyle = '#e8e2d9';
      ctx.font = '10px Inconsolata, monospace';
      ctx.save();
      ctx.rect(x + 2, CUE_Y, w - 4, CUE_H);
      ctx.clip();
      ctx.fillText(cue.text.split('\n')[0], x + 3, CUE_Y + 15);
      ctx.restore();
    });

    // Playhead
    const ph = (vid.currentTime || 0) * PX_PER_SEC;
    ctx.strokeStyle = '#c84a4a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(ph, 0);
    ctx.lineTo(ph, TIMELINE_H);
    ctx.stroke();

    // Triangle
    ctx.fillStyle = '#c84a4a';
    ctx.beginPath();
    ctx.moveTo(ph - 5, 0);
    ctx.lineTo(ph + 5, 0);
    ctx.lineTo(ph, 8);
    ctx.fill();
  }

  // Timeline interactions
  const canvas = document.getElementById('timeline-canvas');

  canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;
    const t    = mx / PX_PER_SEC;

    if (my < RULER_H) {
      vid.currentTime = t;
      return;
    }

    // Hit test cues (reverse so top cue wins)
    let hit = null;
    for (let i = cues.length - 1; i >= 0; i--) {
      const cue = cues[i];
      const x = cue.start * PX_PER_SEC;
      const w = Math.max((cue.end - cue.start) * PX_PER_SEC, 4);
      if (mx >= x && mx <= x + w && my >= CUE_Y && my <= CUE_Y + CUE_H) {
        hit = cue;
        break;
      }
    }

    if (hit) {
      if (e.shiftKey) {
        selectedIds.has(hit.id) ? selectedIds.delete(hit.id) : selectedIds.add(hit.id);
      } else if (!selectedIds.has(hit.id)) {
        selectedIds.clear();
        selectedIds.add(hit.id);
      }

      // Start drag
      const dragIds = new Set(selectedIds);
      const startTimes = {};
      dragIds.forEach(id => {
        const c = cues.find(x => x.id === id);
        if (c) startTimes[id] = { start: c.start, end: c.end };
      });

      dragState = { type: 'cue', dragIds, startTimes, startX: mx };
      renderList();
      drawTimeline();
    } else {
      selectedIds.clear();
      renderList();
      drawTimeline();
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!dragState) return;
    const rect  = canvas.getBoundingClientRect();
    const mx    = e.clientX - rect.left;
    const delta = (mx - dragState.startX) / PX_PER_SEC;

    dragState.dragIds.forEach(id => {
      const cue = cues.find(c => c.id === id);
      if (!cue) return;
      const orig = dragState.startTimes[id];
      cue.start = Math.max(0, orig.start + delta);
      cue.end   = Math.max(cue.start + 0.1, orig.end + delta);
    });

    drawTimeline();
  });

  canvas.addEventListener('mouseup', () => {
    if (dragState) {
      dragState = null;
      cues.sort((a,b) => a.start - b.start);
      renderList();
      drawTimeline();
    }
  });

  canvas.addEventListener('mouseleave', () => {
    if (dragState) {
      dragState = null;
      cues.sort((a,b) => a.start - b.start);
      renderList();
      drawTimeline();
    }
  });

  // ── Export VTT ──
  function exportVTT() {
    let out = 'WEBVTT\n\n';
    cues.forEach((cue, i) => {
      out += `${i+1}\n${toVTTts(cue.start)} --> ${toVTTts(cue.end)}\n${cue.text}\n\n`;
    });
    const a = document.createElement('a');
    a.href = 'data:text/vtt;charset=utf-8,' + encodeURIComponent(out);
    a.download = 'captions-edited.vtt';
    a.click();
    setStatus('Exported ' + cues.length + ' cues');
  }

  // ── Drag & drop file ──
  document.addEventListener('dragover', (e) => {
    e.preventDefault();
    document.getElementById('drop-zone').classList.add('visible');
  });
  document.addEventListener('dragleave', (e) => {
    if (!e.relatedTarget) document.getElementById('drop-zone').classList.remove('visible');
  });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('visible');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (file.name.endsWith('.sbv')) { parseSBV(ev.target.result); setStatus('SBV loaded — ' + cues.length + ' cues'); }
      else { parseVTT(ev.target.result); setStatus('VTT loaded — ' + cues.length + ' cues'); }
      renderList(); drawTimeline();
    };
    reader.readAsText(file);
  });

  // ── Keyboard ──
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.key === 'ArrowLeft')  skip(-1);
    if (e.key === 'ArrowRight') skip(1);
    if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
    if (e.key === 'Escape') { tsPopupClose(); selectedIds.clear(); renderList(); drawTimeline(); }
  });

  // ── Init ──
  vid.addEventListener('loadedmetadata', () => { drawTimeline(); setStatus('Video loaded — ' + toVTTts(vid.duration)); });
  window.addEventListener('resize', drawTimeline);
 setInterval(() => {
    if (cues.length > 0) {
      localStorage.setItem('tiq-cues-backup', JSON.stringify(cues));
    }
  }, 30000);

  // Restore on load
  const backup = localStorage.getItem('tiq-cues-backup');
  if (backup) {
    try {
      const restored = JSON.parse(backup);
      if (restored.length > 0 && confirm('Restore ' + restored.length + ' cues from last session?')) {
        cues = restored;
        nextId = Math.max(...cues.map(c => c.id)) + 1;
        renderList();
        drawTimeline();
        setStatus('Restored ' + cues.length + ' cues from backup');
      }
    } catch(e) {}
  } 
 drawTimeline();
</script>
</body>
</html>
