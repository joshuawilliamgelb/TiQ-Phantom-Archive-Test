<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiQ Subtitle Editor</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inconsolata:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #080808; --bg: #0e0e0e; --panel: #111; --border: #1e1e1e;
    --offwhite: #e8e2d9; --dim: #5a5550; --accent: #c8a97e; --accent2: #7e9ec8;
    --red: #c84a4a; --selected: rgba(200,169,126,0.18); --active: rgba(200,169,126,0.38);
  }
  body { background:var(--black); color:var(--offwhite); font-family:'Inconsolata',monospace; font-weight:300; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  .topbar { display:flex; align-items:center; gap:10px; padding:7px 14px; border-bottom:1px solid var(--border); background:var(--panel); flex-shrink:0; }
  .topbar h1 { font-family:'IM Fell English',serif; font-style:italic; font-size:1rem; margin-right:6px; }
  .tbtn { background:transparent; border:1px solid var(--border); color:var(--dim); font-family:'Inconsolata',monospace; font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; padding:5px 9px; cursor:pointer; transition:border-color 0.12s,color 0.12s; white-space:nowrap; }
  .tbtn:hover { border-color:var(--accent); color:var(--accent); }
  .tbtn.primary { border-color:var(--accent); color:var(--accent); }
  .tbtn.primary:hover { background:var(--accent); color:var(--black); }
  .spacer { flex:1; }
  .status { font-size:0.58rem; color:var(--dim); letter-spacing:0.12em; }

  .main { display:grid; grid-template-columns:560px 1fr; flex:1; overflow:hidden; }

  .left-col { display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; }

  .video-wrap { position:relative; width:100%; aspect-ratio:16/9; background:#000; flex-shrink:0; }
  .video-wrap video { width:100%; height:100%; display:block; object-fit:contain; }

  .sub-overlay { position:absolute; bottom:44px; left:0; right:0; text-align:center; pointer-events:none; z-index:10; }
  .sub-overlay span { display:inline-block; background:rgba(0,0,0,0.78); color:#fff; font-family:'Inconsolata',monospace; font-size:0.82rem; padding:3px 8px; max-width:92%; white-space:pre-wrap; text-align:center; }

  .vid-controls { display:flex; align-items:center; gap:7px; padding:5px 10px; background:#0a0a0a; border-bottom:1px solid var(--border); flex-shrink:0; }
  .vid-btn { background:none; border:none; color:var(--offwhite); cursor:pointer; font-size:13px; padding:2px 5px; opacity:0.8; transition:opacity 0.12s; }
  .vid-btn:hover { opacity:1; }
  .vid-progress { flex:1; height:3px; background:var(--border); border-radius:2px; cursor:pointer; position:relative; }
  .vid-progress-fill { height:100%; background:var(--accent); border-radius:2px; width:0%; pointer-events:none; }
  .vid-time { font-size:0.62rem; color:var(--dim); white-space:nowrap; }

  .timeline-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; background:var(--bg); min-height:80px; }
  .timeline-header { display:flex; align-items:center; gap:8px; padding:5px 10px; border-bottom:1px solid var(--border); font-size:0.55rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); flex-shrink:0; }
  .timeline-scroll { flex:1; overflow-x:auto; overflow-y:hidden; position:relative; }
  #timeline-canvas { display:block; cursor:default; }

  .right-col { display:flex; flex-direction:column; overflow:hidden; }
  .cue-list-header { display:grid; grid-template-columns:32px 88px 88px 1fr 28px; padding:5px 0; border-bottom:1px solid var(--border); font-size:0.55rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); flex-shrink:0; background:var(--panel); }
  .cue-list-header span { padding:0 6px; }
  .cue-list { flex:1; overflow-y:auto; }

  .cue-item { display:grid; grid-template-columns:32px 88px 88px 1fr 28px; align-items:center; border-bottom:1px solid var(--border); min-height:34px; cursor:pointer; }
  .cue-item:hover { background:rgba(255,255,255,0.02); }
  .cue-item.selected { background:var(--selected); }
  .cue-item.active { background:var(--active); }

  .cue-num { font-size:0.55rem; color:var(--dim); text-align:center; padding:4px; user-select:none; }
  .cue-ts { font-size:0.66rem; color:var(--accent); padding:4px 6px; cursor:pointer; white-space:nowrap; }
  .cue-ts:hover { color:var(--offwhite); }
  .cue-text-cell { padding:3px 6px; }
  .cue-text-input { background:transparent; border:none; color:var(--offwhite); font-family:'Inconsolata',monospace; font-size:0.73rem; line-height:1.4; width:100%; resize:none; outline:none; padding:0; min-height:18px; }
  .cue-text-input:focus { background:rgba(255,255,255,0.03); }
  .cue-del { background:none; border:none; color:var(--red); cursor:pointer; font-size:0.68rem; opacity:0; transition:opacity 0.12s; padding:4px; text-align:center; }
  .cue-item:hover .cue-del { opacity:0.6; }
  .cue-del:hover { opacity:1 !important; }

  .ts-popup { position:fixed; background:var(--panel); border:1px solid var(--accent); padding:12px; z-index:100; display:none; flex-direction:column; gap:8px; min-width:200px; }
  .ts-popup.visible { display:flex; }
  .ts-popup label { font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--dim); }
  .ts-popup input { background:#0d0d0d; border:1px solid var(--border); color:var(--offwhite); font-family:'Inconsolata',monospace; font-size:0.85rem; padding:5px 8px; outline:none; width:100%; }
  .ts-popup input:focus { border-color:var(--accent); }
  .ts-popup-btns { display:flex; gap:6px; }
  .ts-popup-btns button { flex:1; background:transparent; border:1px solid var(--border); color:var(--dim); font-family:'Inconsolata',monospace; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; padding:5px; cursor:pointer; transition:border-color 0.12s,color 0.12s; }
  .ts-popup-btns button:hover { border-color:var(--accent); color:var(--accent); }

  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .drop-zone { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:200; font-family:'IM Fell English',serif; font-style:italic; font-size:2rem; color:var(--accent); }
  .drop-zone.visible { display:flex; }
</style>
</head>
<body>

<div class="topbar">
  <h1>TiQ Subtitle Editor</h1>
  <button class="tbtn" onclick="document.getElementById('file-input').click()">Load VTT / SBV</button>
  <input type="file" id="file-input" accept=".vtt,.sbv" style="display:none" onchange="loadFile(event)">
  <button class="tbtn" onclick="addCue()">+ Add Cue</button>
  <button class="tbtn" onclick="deleteSelected()">Delete Selected</button>
  <button class="tbtn" onclick="shiftSelected()">Shift Selected…</button>
  <div class="spacer"></div>
  <div class="status" id="status-bar">Load a VTT or SBV file to begin</div>
  <button class="tbtn primary" onclick="exportVTT()">Export VTT</button>
</div>

<div class="main">
  <div class="left-col">
    <div class="video-wrap">
      <video id="vid" preload="metadata" playsinline></video>
      <div class="sub-overlay"><span id="sub-display"></span></div>
    </div>
    <div class="vid-controls">
      <button class="vid-btn" id="btn-play" onclick="togglePlay()">▶</button>
      <button class="vid-btn" onclick="skip(-5)">−5s</button>
      <button class="vid-btn" onclick="skip(-1)">−1s</button>
      <button class="vid-btn" onclick="skip(1)">+1s</button>
      <button class="vid-btn" onclick="skip(5)">+5s</button>
      <div class="vid-progress" id="vid-progress" onclick="seekClick(event)">
        <div class="vid-progress-fill" id="vid-fill"></div>
      </div>
      <div class="vid-time" id="vid-time">0:00:00 / 0:00:00</div>
    </div>
    <div class="timeline-wrap">
      <div class="timeline-header">
        <span>Timeline &nbsp;·&nbsp;</span>
        <span style="color:var(--accent)">drag cues · shift+click multi-select · click ruler to seek</span>
      </div>
      <div class="timeline-scroll" id="timeline-scroll">
        <canvas id="timeline-canvas"></canvas>
      </div>
    </div>
  </div>

  <div class="right-col">
    <div class="cue-list-header">
      <span>#</span><span>Start</span><span>End</span><span>Text</span><span></span>
    </div>
    <div class="cue-list" id="cue-list"></div>
  </div>
</div>

<div class="ts-popup" id="ts-popup">
  <label id="ts-popup-label">Edit Timestamp</label>
  <input type="text" id="ts-popup-input" placeholder="HH:MM:SS.mmm">
  <div class="ts-popup-btns">
    <button onclick="tsPopupConfirm()">Set</button>
    <button onclick="tsPopupSetNow()">Use Now</button>
    <button onclick="tsPopupClose()">Cancel</button>
  </div>
</div>

<div class="drop-zone" id="drop-zone">Drop VTT or SBV file here</div>

<script>
  const VIDEO_URL = 'https://tiq-phantom-archive.b-cdn.net/SYNC%20ARCHIVE%20-%20Phantom.mp4';

  let cues = [];
  let selectedIds = new Set();
  let lastSelectedId = null; // for shift-range selection
  let activeCueId = null;
  let nextId = 1;
  let tsPopupTarget = null;
  let dragState = null;

  const vid = document.getElementById('vid');
  vid.src = VIDEO_URL;

  // ── Utilities ──
  function parseTS(ts) {
    ts = ts.trim().replace(',', '.');
    const parts = ts.split(':').map(Number);
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    if (parts.length === 2) return parts[0]*60 + parts[1];
    return parts[0];
  }

  function toVTTts(sec) {
    if (!sec || sec < 0) sec = 0;
    const h  = Math.floor(sec / 3600);
    const m  = Math.floor((sec % 3600) / 60);
    const s  = sec % 60;
    const ms = Math.round((s % 1) * 1000);
    return `${pad(h)}:${pad(m)}:${pad(Math.floor(s))}.${pad3(ms)}`;
  }

  function pad(n)  { return String(n).padStart(2,'0'); }
  function pad3(n) { return String(n).padStart(3,'0'); }
  function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

  // ── Parse ──
  function parseVTT(text) {
    cues = []; nextId = 1;
    const lines = text.split('\n');
    let i = 0;
    while (i < lines.length) {
      const line = lines[i].trim();
      if (line.includes('-->')) {
        const [startRaw, endRaw] = line.split('-->').map(s => s.trim());
        const start = parseTS(startRaw), end = parseTS(endRaw);
        i++;
        const textLines = [];
        while (i < lines.length && lines[i].trim() !== '' && !lines[i].includes('-->')) {
          textLines.push(lines[i].trim()); i++;
        }
        cues.push({ id: nextId++, start, end, text: textLines.join('\n') });
      } else { i++; }
    }
  }

  function parseSBV(text) {
    cues = []; nextId = 1;
    const lines = text.split('\n');
    let i = 0;
    while (i < lines.length) {
      const line = lines[i].trim();
      const m = line.match(/^(\d+:\d+:\d+\.\d+|\d+:\d+\.\d+),(\d+:\d+:\d+\.\d+|\d+:\d+\.\d+)$/);
      if (m) {
        const start = parseTS(m[1]), end = parseTS(m[2]);
        i++;
        const textLines = [];
        while (i < lines.length && lines[i].trim() !== '') { textLines.push(lines[i].trim()); i++; }
        cues.push({ id: nextId++, start, end, text: textLines.join('\n') });
      } else { i++; }
    }
  }

  function loadFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (file.name.endsWith('.sbv')) { parseSBV(ev.target.result); }
      else { parseVTT(ev.target.result); }
      setStatus((file.name.endsWith('.sbv') ? 'SBV' : 'VTT') + ' loaded — ' + cues.length + ' cues');
      rebuildList();
    };
    reader.readAsText(file);
  }

  // ── FULL rebuild — only called when cues array changes ──
  function rebuildList() {
    const list = document.getElementById('cue-list');
    list.innerHTML = '';
    cues.forEach((cue, idx) => {
      const row = document.createElement('div');
      row.className = 'cue-item';
      row.dataset.id = cue.id;
      if (selectedIds.has(cue.id)) row.classList.add('selected');
      if (cue.id === activeCueId) row.classList.add('active');

      row.innerHTML = `
        <div class="cue-num">${idx+1}</div>
        <div class="cue-ts" data-id="${cue.id}" data-field="start">${toVTTts(cue.start)}</div>
        <div class="cue-ts" data-id="${cue.id}" data-field="end">${toVTTts(cue.end)}</div>
        <div class="cue-text-cell"><textarea class="cue-text-input" data-id="${cue.id}" rows="1">${escHtml(cue.text)}</textarea></div>
        <button class="cue-del" data-id="${cue.id}">✕</button>
      `;

      // Row click — selection only, no DOM rebuild
      row.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('cue-ts') ||
            e.target.classList.contains('cue-text-input') ||
            e.target.classList.contains('cue-del')) return;
        e.preventDefault();

        if (e.shiftKey && lastSelectedId !== null) {
          // Range select
          const lastIdx = cues.findIndex(c => c.id === lastSelectedId);
          const thisIdx = cues.findIndex(c => c.id === cue.id);
          const from = Math.min(lastIdx, thisIdx);
          const to   = Math.max(lastIdx, thisIdx);
          for (let i = from; i <= to; i++) selectedIds.add(cues[i].id);
        } else if (e.shiftKey) {
          selectedIds.add(cue.id);
          lastSelectedId = cue.id;
        } else {
          selectedIds.clear();
          selectedIds.add(cue.id);
          lastSelectedId = cue.id;
          vid.currentTime = cue.start;
        }
        updateSelectionClasses();
      });

      list.appendChild(row);
    });

    // Timestamp clicks
    list.querySelectorAll('.cue-ts').forEach(el => {
      el.addEventListener('click', (e) => {
        openTsPopup(parseInt(el.dataset.id), el.dataset.field, e.clientX, e.clientY);
      });
    });

    // Text edits — no rebuild, just update data
    list.querySelectorAll('.cue-text-input').forEach(el => {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
      el.addEventListener('input', () => {
        const cue = cues.find(c => c.id === parseInt(el.dataset.id));
        if (cue) cue.text = el.value;
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
      });
    });

    // Delete buttons — rebuild needed
    list.querySelectorAll('.cue-del').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.id);
        cues = cues.filter(c => c.id !== id);
        selectedIds.delete(id);
        if (lastSelectedId === id) lastSelectedId = null;
        rebuildList();
      });
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Fast: just update CSS classes, no DOM rebuild ──
  function updateSelectionClasses() {
    document.querySelectorAll('#cue-list .cue-item').forEach(row => {
      const id = parseInt(row.dataset.id);
      row.classList.toggle('selected', selectedIds.has(id));
      row.classList.toggle('active', id === activeCueId);
    });
  }

  // ── Fast: update timestamps in list without rebuild ──
  function updateTimestampsInList() {
    document.querySelectorAll('#cue-list .cue-ts').forEach(el => {
      const id    = parseInt(el.dataset.id);
      const field = el.dataset.field;
      const cue   = cues.find(c => c.id === id);
      if (cue) el.textContent = toVTTts(cue[field]);
    });
  }

  function scrollActiveCueIntoView() {
    const row = document.querySelector(`#cue-list .cue-item.active`);
    if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // ── Add / delete / shift ──
  function addCue() {
    const t = vid.currentTime;
    cues.push({ id: nextId++, start: t, end: t + 2, text: 'New cue' });
    cues.sort((a,b) => a.start - b.start);
    rebuildList();
    setStatus('Cue added at ' + toVTTts(t));
  }

  function deleteSelected() {
    if (selectedIds.size === 0) { setStatus('No cues selected'); return; }
    const n = selectedIds.size;
    cues = cues.filter(c => !selectedIds.has(c.id));
    selectedIds.clear();
    lastSelectedId = null;
    rebuildList();
    setStatus('Deleted ' + n + ' cue' + (n > 1 ? 's' : ''));
  }

  function shiftSelected() {
    if (selectedIds.size === 0) { setStatus('No cues selected'); return; }
    const secs = parseFloat(prompt('Shift selected cues by how many seconds? (+ or −)'));
    if (isNaN(secs)) return;
    cues.forEach(c => {
      if (selectedIds.has(c.id)) {
        c.start = Math.max(0, c.start + secs);
        c.end   = Math.max(c.start + 0.1, c.end + secs);
      }
    });
    cues.sort((a,b) => a.start - b.start);
    rebuildList();
    setStatus('Shifted ' + selectedIds.size + ' cues by ' + secs + 's');
  }

  // ── Timestamp popup ──
  function openTsPopup(cueId, field, x, y) {
    tsPopupTarget = { cueId, field };
    const cue = cues.find(c => c.id === cueId);
    document.getElementById('ts-popup-label').textContent = field === 'start' ? 'Edit Start Time' : 'Edit End Time';
    document.getElementById('ts-popup-input').value = toVTTts(field === 'start' ? cue.start : cue.end);
    const popup = document.getElementById('ts-popup');
    popup.style.left = Math.min(x, window.innerWidth - 220) + 'px';
    popup.style.top  = Math.min(y, window.innerHeight - 150) + 'px';
    popup.classList.add('visible');
    document.getElementById('ts-popup-input').focus();
  }

  function tsPopupConfirm() {
    const sec = parseTS(document.getElementById('ts-popup-input').value);
    if (!isNaN(sec) && tsPopupTarget) {
      const cue = cues.find(c => c.id === tsPopupTarget.cueId);
      if (cue) cue[tsPopupTarget.field] = sec;
    }
    tsPopupClose();
    cues.sort((a,b) => a.start - b.start);
    rebuildList();
  }

  function tsPopupSetNow() {
    document.getElementById('ts-popup-input').value = toVTTts(vid.currentTime);
  }

  function tsPopupClose() {
    document.getElementById('ts-popup').classList.remove('visible');
    tsPopupTarget = null;
  }

  document.getElementById('ts-popup-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tsPopupConfirm();
    if (e.key === 'Escape') tsPopupClose();
  });

  // ── Video ──
  function togglePlay() {
    if (vid.paused) vid.play(); else vid.pause();
  }

  function skip(s) { vid.currentTime = Math.max(0, vid.currentTime + s); }

  function seekClick(e) {
    const rect = document.getElementById('vid-progress').getBoundingClientRect();
    vid.currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * (vid.duration || 0);
  }

  vid.addEventListener('play',  () => { document.getElementById('btn-play').textContent = '⏸'; });
  vid.addEventListener('pause', () => { document.getElementById('btn-play').textContent = '▶'; });

  // timeupdate: ONLY update progress bar and subtitle overlay + active cue class
  // NO rebuildList() here — that's the key fix
  vid.addEventListener('timeupdate', () => {
    const t = vid.currentTime, d = vid.duration || 0;
    document.getElementById('vid-fill').style.width = (d ? t/d*100 : 0) + '%';
    document.getElementById('vid-time').textContent = toVTTts(t) + ' / ' + toVTTts(d);

    const active = cues.find(c => t >= c.start && t <= c.end);
    document.getElementById('sub-display').textContent = active ? active.text : '';

    if (active) {
      if (active.id !== activeCueId) {
        activeCueId = active.id;
        updateSelectionClasses();
        scrollActiveCueIntoView();
      }
    } else if (activeCueId !== null) {
      activeCueId = null;
      updateSelectionClasses();
    }
  });

  // ── Timeline ──
  const TL_H = 80, CUE_H = 24, CUE_Y = 26, RULER_H = 18, PPS = 12;

  function drawTimeline() {
    const canvas = document.getElementById('timeline-canvas');
    const scroll = document.getElementById('timeline-scroll');
    const dur    = vid.duration || 3900;
    const totalW = Math.max(dur * PPS + 200, scroll.clientWidth);

    canvas.width  = totalW;
    canvas.height = TL_H;

    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, totalW, TL_H);

    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, totalW, RULER_H);

    // Ruler ticks
    for (let s = 0; s <= dur + 30; s += 10) {
      const x = s * PPS;
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,RULER_H); ctx.stroke();
      ctx.fillStyle = '#5a5550'; ctx.font = '9px Inconsolata,monospace';
      ctx.fillText(toVTTts(s).substring(0,8), x+2, 13);
    }

    // Cues
    cues.forEach(cue => {
      const x = cue.start * PPS;
      const w = Math.max((cue.end - cue.start) * PPS, 6);
      const isSel = selectedIds.has(cue.id);
      const isAct = cue.id === activeCueId;
      ctx.fillStyle = isAct ? 'rgba(200,169,126,0.65)' : isSel ? 'rgba(200,169,126,0.35)' : 'rgba(126,158,200,0.3)';
      ctx.fillRect(x, CUE_Y, w, CUE_H);
      ctx.strokeStyle = isAct ? '#c8a97e' : isSel ? '#c8a97e' : '#7e9ec8';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, CUE_Y, w, CUE_H);
      ctx.fillStyle = '#e8e2d9'; ctx.font = '10px Inconsolata,monospace';
      ctx.save(); ctx.beginPath(); ctx.rect(x+2, CUE_Y, w-4, CUE_H); ctx.clip();
      ctx.fillText(cue.text.split('\n')[0], x+3, CUE_Y+15);
      ctx.restore();
    });

    // Playhead
    const ph = (vid.currentTime||0) * PPS;
    ctx.strokeStyle = '#c84a4a'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(ph,0); ctx.lineTo(ph,TL_H); ctx.stroke();
    ctx.fillStyle = '#c84a4a';
    ctx.beginPath(); ctx.moveTo(ph-5,0); ctx.lineTo(ph+5,0); ctx.lineTo(ph,8); ctx.fill();
  }

  // RAF loop for smooth playhead — decoupled from timeupdate
  function rafLoop() { drawTimeline(); requestAnimationFrame(rafLoop); }
  requestAnimationFrame(rafLoop);

  // Timeline mouse
  const tlCanvas = document.getElementById('timeline-canvas');

  tlCanvas.addEventListener('mousedown', (e) => {
    const rect = tlCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;

    if (my < RULER_H) { vid.currentTime = mx / PPS; return; }

    let hit = null;
    for (let i = cues.length-1; i >= 0; i--) {
      const c = cues[i], x = c.start*PPS, w = Math.max((c.end-c.start)*PPS,6);
      if (mx>=x && mx<=x+w && my>=CUE_Y && my<=CUE_Y+CUE_H) { hit=c; break; }
    }

    if (hit) {
      if (e.shiftKey && lastSelectedId !== null) {
        const lastIdx = cues.findIndex(c => c.id === lastSelectedId);
        const thisIdx = cues.findIndex(c => c.id === hit.id);
        const from = Math.min(lastIdx,thisIdx), to = Math.max(lastIdx,thisIdx);
        for (let i=from; i<=to; i++) selectedIds.add(cues[i].id);
      } else if (e.shiftKey) {
        selectedIds.add(hit.id); lastSelectedId = hit.id;
      } else if (!selectedIds.has(hit.id)) {
        selectedIds.clear(); selectedIds.add(hit.id); lastSelectedId = hit.id;
      }

      const startTimes = {};
      selectedIds.forEach(id => {
        const c = cues.find(x => x.id===id);
        if (c) startTimes[id] = { start:c.start, end:c.end };
      });
      dragState = { dragIds: new Set(selectedIds), startTimes, startX: mx };
      updateSelectionClasses();
    } else {
      selectedIds.clear(); lastSelectedId = null;
      updateSelectionClasses();
    }
  });

  tlCanvas.addEventListener('mousemove', (e) => {
    if (!dragState) return;
    const rect = tlCanvas.getBoundingClientRect();
    const delta = (e.clientX - rect.left - dragState.startX) / PPS;
    dragState.dragIds.forEach(id => {
      const cue = cues.find(c => c.id===id);
      if (!cue) return;
      const orig = dragState.startTimes[id];
      cue.start = Math.max(0, orig.start+delta);
      cue.end   = Math.max(cue.start+0.1, orig.end+delta);
    });
  });

  tlCanvas.addEventListener('mouseup', () => {
    if (dragState) {
      dragState = null;
      cues.sort((a,b) => a.start-b.start);
      rebuildList();
    }
  });

  tlCanvas.addEventListener('mouseleave', () => {
    if (dragState) { dragState = null; cues.sort((a,b)=>a.start-b.start); rebuildList(); }
  });

  // ── Export ──
  function exportVTT() {
    let out = 'WEBVTT\n\n';
    cues.forEach((c,i) => { out += `${i+1}\n${toVTTts(c.start)} --> ${toVTTts(c.end)}\n${c.text}\n\n`; });
    const a = document.createElement('a');
    a.href = 'data:text/vtt;charset=utf-8,' + encodeURIComponent(out);
    a.download = 'captions-edited.vtt';
    a.click();
    setStatus('Exported ' + cues.length + ' cues');
  }

  // ── Autosave ──
  setInterval(() => {
    if (cues.length > 0) localStorage.setItem('tiq-sub-backup', JSON.stringify(cues));
  }, 15000);

  const backup = localStorage.getItem('tiq-sub-backup');
  if (backup) {
    try {
      const restored = JSON.parse(backup);
      if (restored.length > 0 && confirm('Restore ' + restored.length + ' cues from last session?')) {
        cues = restored;
        nextId = Math.max(...cues.map(c=>c.id)) + 1;
        rebuildList();
        setStatus('Restored ' + cues.length + ' cues');
      }
    } catch(e) {}
  }

  // ── Drag & drop file ──
  document.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('drop-zone').classList.add('visible'); });
  document.addEventListener('dragleave', (e) => { if (!e.relatedTarget) document.getElementById('drop-zone').classList.remove('visible'); });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('visible');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (file.name.endsWith('.sbv')) parseSBV(ev.target.result); else parseVTT(ev.target.result);
      setStatus('Loaded ' + cues.length + ' cues');
      rebuildList();
    };
    reader.readAsText(file);
  });

  // ── Keyboard ──
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
    if (e.code==='Space') { e.preventDefault(); togglePlay(); }
    if (e.key==='ArrowLeft')  skip(e.shiftKey ? -5 : -1);
    if (e.key==='ArrowRight') skip(e.shiftKey ? 5 : 1);
    if (e.key==='Delete'||e.key==='Backspace') deleteSelected();
    if (e.key==='Escape') { tsPopupClose(); selectedIds.clear(); lastSelectedId=null; updateSelectionClasses(); }
  });

  vid.addEventListener('loadedmetadata', () => { setStatus('Video ready — ' + toVTTts(vid.duration)); });
  window.addEventListener('resize', drawTimeline);
</script>
</body>
</html>
